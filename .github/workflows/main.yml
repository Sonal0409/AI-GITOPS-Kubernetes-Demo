name: CICD for nodejsapp
on:
  push:
    branches:
      - master
jobs:
  builddockerimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t nodejsapp .

      - name: Login to Docker Hub
        run: docker login -u sonal04 -p ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Change Imagename
        run: docker tag nodejsapp sonal04/nodejsapp:latest

      - name: Push Docker image to Docker Hub
        run: docker push sonal04/nodejsapp:latest
