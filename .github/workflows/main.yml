name: AI DevOps Pipeline
on:
  push:
    branches:
      - main
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Build docker image
      run: docker build -t myimage01 .
    - name: push image
      run: |
        docker login -u sonal04 -p ${{ secrets.DOCKERHUB_TOKEN }}
